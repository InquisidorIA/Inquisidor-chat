<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clarence | Terminal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; overflow: hidden; }

        /* Barra Desplegable (Nube) */
        #sidebar {
            position: fixed; left: -300px; top: 0; width: 280px; height: 100%;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(20px);
            border-right: 1px solid #333;
            transition: left 0.3s ease;
            z-index: 100;
            padding: 20px;
        }
        #sidebar.open { left: 0; }

        /* Pantalla */
        #main { flex: 1; display: flex; flex-direction: column; width: 100%; }
        header { padding: 15px; border-bottom: 1px solid #333; display: flex; gap: 15px; align-items: center; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; }
        #input-area { padding: 20px; border-top: 1px solid #333; display: flex; gap: 10px; }
        
        input { flex: 1; padding: 12px; background: #111; border: 1px solid #444; border-radius: 8px; color: #fff; }
        button { padding: 10px 15px; background: #6b21a8; border: none; border-radius: 8px; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <aside id="sidebar">
        <h2 style="margin-bottom: 20px; color: #888;">MEMORIA</h2>
        <div id="history">Cargando...</div>
        <button style="margin-top: 20px; width: 100%;">+ Nueva Charla</button>
    </aside>

    <main id="main">
        <header>
            <button id="toggle-btn">☰</button>
            <span>Clarence</span>
        </header>
        <div id="chat"><div id="messages"></div></div>
        <div id="input-area">
            <input id="input" type="text" placeholder="Habla con tu jefe...">
            <button id="send-btn">Enviar</button>
        </div>
    </main>

    <script>
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('toggle-btn');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send-btn');
        const messages = document.getElementById('messages');

        // Toggle Sidebar
        toggleBtn.onclick = () => sidebar.classList.toggle('open');

        // Lógica envío
        function enviar() {
            if(!input.value.trim()) return;
            messages.innerHTML += `<div style="padding: 10px; background: #222; margin-bottom: 10px; border-radius: 8px;">${input.value}</div>`;
            input.value = '';
            // Auto scroll
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
        }

        sendBtn.onclick = enviar;
        input.onkeydown = (e) => { if(e.key === 'Enter') enviar(); };
    </script>
</body>
</html>

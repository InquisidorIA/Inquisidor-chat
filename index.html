<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarence</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white h-screen flex flex-col">
    <div id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
    <div class="p-4 border-t border-zinc-900">
        <div class="max-w-2xl mx-auto flex gap-2">
            <input id="input" class="flex-1 bg-zinc-900 p-4 rounded border border-zinc-700" placeholder="¿Qué tenemos hoy en mente?">
            <button id="send-btn" class="bg-amber-700 p-4 rounded font-bold">Enviar</button>
        </div>
    </div>

    <script>
        const userId = 'user_123'; // Esto debería ser dinámico luego
        let mensajes = [{ role: 'assistant', content: "Aquí estoy. ¿Qué traes en mente hoy? Suéltalo." }];

        function renderChat() {
            const container = document.getElementById('chat-container');
            container.innerHTML = mensajes.map(m => `
                <div class="${m.role === 'user' ? 'text-right' : 'bg-zinc-900 p-4 rounded'}">
                    ${m.content}
                </div>
            `).join('');
        }

        async function enviar() {
            const input = document.getElementById('input');
            const text = input.value.trim();
            if (!text) return;

            mensajes.push({ role: 'user', content: text });
            input.value = '';
            renderChat();

            const res = await fetch('/api/chat', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ messages, userId }) 
            });
            
            const data = await res.json();
            mensajes.push({ role: 'assistant', content: data.content });
            renderChat();
        }

        document.getElementById('send-btn').onclick = enviar;
        renderChat();
    </script>
</body>
</html>

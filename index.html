<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarence</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }

        /* Fondo de puntos sutiles */
        #bg-effect {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #2e003e 0%, #000 70%);
            background-image: radial-gradient(rgba(255,255,255,0.15) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0; pointer-events: none; z-index: 0;
        }

        /* Animación suave: Aparece y desaparece */
        @keyframes respirar {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }
        .respirar-anim { animation: respirar 4s ease-in-out forwards; }

        #menu-btn { 
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: transparent; border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%; width: 50px; height: 50px; cursor: pointer;
            color: white; display: flex; align-items: center; justify-content: center;
        }

        #chat-container { width: 100%; height: 100%; display: flex; flex-direction: column; padding: 80px 20px 20px; z-index: 1; position: relative; }
        #messages { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        .clarence-msg { align-self: flex-start; padding: 15px 20px; border-radius: 20px; background: linear-gradient(135deg, #4527a0, #000); border: 1px solid #673ab7; max-width: 80%; }
        .user-msg { align-self: flex-end; padding: 15px 20px; border-radius: 20px; background: #222; max-width: 80%; }

        #input-zone { display: flex; gap: 10px; padding-bottom: 20px; }
        input { flex-grow: 1; background: #1a1a1a; border: 1px solid #333; padding: 15px; border-radius: 15px; color: white; outline: none; }
    </style>
</head>
<body>
    <div id="bg-effect"></div>
    <button id="menu-btn" onclick="toggleHistory()">☰</button>

    <div id="chat-container">
        <div id="messages"><p class="clarence-msg">Hola, soy Clarence. ¿En qué te puedo ayudar hoy?</p></div>
        <div id="input-zone">
            <input type="text" id="user-input" placeholder="Escribe tu mensaje..." onkeydown="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()" style="padding:0 20px; border-radius:15px; background:#311b92; color:white; border:none; cursor:pointer;">Enviar</button>
        </div>
    </div>

    <script>
        // Función para el botón menú (Historial)
        function toggleHistory() {
            console.log("Desplegando historial..."); // Aquí va tu lógica de historial
        }

        // Función centralizada para la iluminación (Respiración)
        function triggerPulse() {
            const bg = document.getElementById('bg-effect');
            bg.classList.remove('respirar-anim');
            void bg.offsetWidth; // Reset de animación
            bg.classList.add('respirar-anim');
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const msg = input.value;
            if(msg.trim() === "") return;

            // 1. Mostrar mensaje
            const chat = document.getElementById('messages');
            chat.innerHTML += `<p class="user-msg">${msg}</p>`;
            input.value = "";

            // 2. Activar "respiración" de luces
            triggerPulse();

            // 3. Llamada a la IA
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: 'nacho', messages: [{ role: 'user', content: msg }] })
                });
                const data = await res.json();
                chat.innerHTML += `<p class="clarence-msg">${data.content}</p>`;
            } catch (e) {
                chat.innerHTML += `<p class="clarence-msg">Error de conexión.</p>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>

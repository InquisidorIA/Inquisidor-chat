<!DOCTYPE html>
<html lang="es" class="bg-black text-white">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        .inquisidor-font { font-family: 'Playfair Display', serif; }
        .user-font { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6">
    
    <div id="chat-container" class="w-full max-w-2xl flex flex-col space-y-6">
        <!-- Los mensajes aparecerán aquí -->
    </div>

    <div class="fixed bottom-0 w-full max-w-2xl p-6">
        <input id="input" class="w-full bg-zinc-900 border border-zinc-700 p-4 text-white focus:outline-none focus:border-amber-600 transition-all" placeholder="Escribe algo interesante...">
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const input = document.getElementById('input');

        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const text = input.value;
                // Mostrar mensaje usuario
                chatContainer.innerHTML += `<div class="flex justify-end"><div class="max-w-[80%] bg-zinc-950 border border-zinc-800 p-4 text-zinc-400 user-font rounded-sm">${text}</div></div>`;
                input.value = '';

                // Llamada a tu API
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ messages: [{role: 'user', content: text}] })
                });
                const data = await res.json();

                // Mostrar respuesta Inquisidor
                chatContainer.innerHTML += `<div class="flex justify-start"><div class="max-w-[80%] bg-zinc-900 border border-amber-900/50 p-6 text-amber-50 inquisidor-font italic rounded-sm shadow-2xl">${data.content}</div></div>`;
            }
        });
    </script>
</body>
</html>

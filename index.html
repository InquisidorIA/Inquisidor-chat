<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Inquisidor</title>

    <!-- Configuración PWA -->
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="https://i.imgur.com/rYqz9No.jpeg">
    <meta name="theme-color" content="#000000">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300&display=swap" rel="stylesheet">
    
    <style>
        body { background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%); height: 100vh; display: flex; flex-direction: column; margin: 0; }
        #chat-scroll { flex: 1; overflow-y: auto; padding-bottom: 150px; }
    </style>
</head>
<body class="text-white">

    <div id="chat-scroll">
        <div id="chat-container" class="w-full max-w-2xl mx-auto p-4 md:p-6 flex flex-col space-y-8 mt-10">
            <!-- Los mensajes aparecen aquí -->
        </div>
    </div>

    <div class="fixed bottom-0 left-0 w-full p-4 bg-black border-t border-zinc-900">
        <div class="max-w-2xl mx-auto">
            <input id="input" type="text" class="w-full bg-zinc-900 p-4 text-white border border-zinc-700 rounded focus:outline-none" placeholder="Escribe aquí...">
        </div>
    </div>

    <script>
        // Registrar Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }

        const container = document.getElementById('chat-container');
        const input = document.getElementById('input');
        const scroll = document.getElementById('chat-scroll');

        window.onload = () => {
            container.innerHTML += `<div class="p-6 bg-[#1a1710] border-l-4 border-amber-600">Bienvenido. ¿Qué tienes hoy en mente? Estoy listo para iluminarte.</div>`;
        };

        input.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const text = input.value.trim();
                if (!text) return;
                
                container.innerHTML += `<div class="text-right text-gray-400 p-4">${text}</div>`;
                input.value = '';
                scroll.scrollTop = scroll.scrollHeight;

                try {
                    const res = await fetch('/api/chat', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ messages: [{role: 'user', content: text}] })
                    });
                    const data = await res.json();
                    
                    if (data.error) throw new Error(data.error);

                    container.innerHTML += `<div class="p-6 bg-[#1a1710] border-l-4 border-amber-600">${data.content}</div>`;
                    scroll.scrollTop = scroll.scrollHeight;
                } catch (err) {
                    container.innerHTML += `<div class="p-4 bg-red-900">Error: ${err.message}</div>`;
                }
            }
        });
    </script>
</body>
</html>

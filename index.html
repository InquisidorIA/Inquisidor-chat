<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clarence</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }

        #bg-effect {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #2e003e 0%, #000 70%);
            background-image: radial-gradient(white 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0; transition: opacity 1s ease; pointer-events: none; z-index: 0;
        }

        #menu-btn { 
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: transparent; border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%; width: 50px; height: 50px; cursor: pointer;
            font-size: 24px; color: white; display: flex; align-items: center; justify-content: center;
        }

        #chat-container { width: 100%; height: 100%; display: flex; flex-direction: column; padding: 80px 20px 20px; z-index: 1; position: relative; }
        #messages { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        .clarence-msg { align-self: flex-start; padding: 15px 20px; border-radius: 20px; background: linear-gradient(135deg, #4527a0, #000); color: #fff; max-width: 80%; border: 1px solid #673ab7; }
        .user-msg { align-self: flex-end; padding: 15px 20px; border-radius: 20px; background: #222; color: #fff; max-width: 80%; }

        #input-zone { display: flex; gap: 10px; padding-bottom: 20px; }
        input { flex-grow: 1; background: #1a1a1a; border: 1px solid #333; padding: 15px; border-radius: 15px; color: white; outline: none; }
        #send-btn { background: #311b92; border: none; padding: 15px 25px; border-radius: 15px; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div id="bg-effect"></div>
    <button id="menu-btn" onclick="toggleMenuLights()">◡</button>

    <div id="chat-container">
        <div id="messages"><p class="clarence-msg">Hola, soy Clarence. ¿En qué te puedo ayudar hoy?</p></div>
        <div id="input-zone">
            <input type="text" id="user-input" placeholder="Escribe tu mensaje...">
            <button id="send-btn" onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script>
        function toggleMenuLights() {
            const bg = document.getElementById('bg-effect');
            bg.style.opacity = (bg.style.opacity === '1') ? '0' : '1';
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const msg = input.value;
            if(msg.trim() === "") return;

            // Iluminar al enviar
            document.getElementById('bg-effect').style.opacity = '1';

            const chat = document.getElementById('messages');
            chat.innerHTML += `<p class="user-msg">${msg}</p>`;
            input.value = "";

            const loader = document.createElement('p');
            loader.className = 'clarence-msg';
            loader.innerText = "Clarence está analizando...";
            chat.appendChild(loader);

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();
                loader.innerText = data.reply;
            } catch (e) {
                loader.innerText = "Error de conexión con el backend.";
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>

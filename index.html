<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Clarence</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; }
        .input-area { padding: 20px; border-top: 1px solid #333; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; background: #111; color: #fff; border: 1px solid #444; }
        button { padding: 10px 20px; background: #b45309; color: #fff; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat-container"></div>
    <div class="input-area">
        <input id="input" placeholder="Escribe algo...">
        <button id="send-btn">Enviar</button>
    </div>

    <script>
        const userId = 'user_123';
        let mensajes = [{ role: 'assistant', content: "Aquí estoy." }];

        function renderChat() {
            const container = document.getElementById('chat-container');
            container.innerHTML = mensajes.map(m => `<div><strong>${m.role}:</strong> ${m.content}</div>`).join('<br>');
        }

        async function enviar() {
            const input = document.getElementById('input');
            const text = input.value.trim();
            if (!text) return;

            mensajes.push({ role: 'user', content: text });
            input.value = '';
            renderChat();

            try {
                const res = await fetch('/api/chat', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ messages: mensajes, userId }) 
                });
                
                const data = await res.json();
                mensajes.push({ role: 'assistant', content: data.content });
                renderChat();
            } catch (e) {
                console.error("Error de conexión:", e);
            }
        }

        document.getElementById('send-btn').onclick = enviar;
        renderChat();
    </script>
</body>
</html>

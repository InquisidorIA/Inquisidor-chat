<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarence | Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; margin: 0; }

        /* Capa permanente que solo cambia de opacidad */
        #fx-layer {
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0;
            will-change: opacity;
            transition: opacity 2s ease-in-out;
            background: radial-gradient(circle at 50% 50%, #2e1065 0%, #000 70%);
        }

        #fx-stars {
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0;
            will-change: opacity;
            transition: opacity 2s ease-in-out;
            background-image: radial-gradient(white, rgba(255,255,255,0.2) 1px, transparent 1px);
            background-size: 50px 50px;
        }
    </style>
</head>
<body class="text-zinc-200 h-screen flex flex-col font-sans">
    
    <!-- Capas de efectos -->
    <div id="fx-layer"></div>
    <div id="fx-stars"></div>

    <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-6">
        <div class="max-w-3xl mx-auto space-y-6 pt-4" id="messages-list"></div>
    </div>

    <div class="p-4 border-t border-zinc-800 bg-[#0A0A0A]/50">
        <div class="max-w-3xl mx-auto">
            <div class="relative bg-zinc-900 rounded-xl border border-zinc-700">
                <input id="input" 
                    class="w-full bg-transparent p-4 pr-16 text-white outline-none" 
                    placeholder="Escribe lo que tienes en mente..."
                    onkeydown="if(event.key==='Enter') enviar()">
                <button id="send-btn" class="absolute right-2 top-2 bottom-2 px-4 bg-purple-700 text-white font-medium rounded-lg transition-colors">
                    Enviar
                </button>
            </div>
        </div>
    </div>

    <script>
        const userId = 'user_123';
        let mensajes = [{ role: 'assistant', content: "Aquí estoy. ¿Qué traes en mente hoy? Suéltalo." }];

        function toggleEffect(active) {
            const layer = document.getElementById('fx-layer');
            const stars = document.getElementById('fx-stars');
            const opacity = active ? '0.4' : '0';
            layer.style.opacity = opacity;
            stars.style.opacity = opacity;
        }

        function renderChat() {
            const list = document.getElementById('messages-list');
            list.innerHTML = mensajes.map(m => `
                <div class="flex gap-4 ${m.role === 'user' ? 'justify-end' : 'justify-start'}">
                    <div class="max-w-[85%] p-4 rounded-2xl shadow-sm ${
                        m.role === 'user' 
                        ? 'bg-zinc-800 text-zinc-100' 
                        : 'bg-zinc-900/50 border border-purple-500/20 text-zinc-200'
                    }">
                        ${m.content}
                    </div>
                </div>
            `).join('');
            document.getElementById('chat-container').scrollTop = document.getElementById('chat-container').scrollHeight;
        }

        async function enviar() {
            const input = document.getElementById('input');
            const text = input.value.trim();
            if (!text) return;

            toggleEffect(true); // Encendido suave

            mensajes.push({ role: 'user', content: text });
            input.value = '';
            renderChat();

            try {
                const res = await fetch('/api/chat', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ messages: mensajes, userId }) 
                });
                const data = await res.json();
                mensajes.push({ role: 'assistant', content: data.content });
            } catch (e) {
                mensajes.push({ role: 'assistant', content: "Error técnico." });
            } finally {
                toggleEffect(false); // Apagado suave
                renderChat();
            }
        }

        document.getElementById('send-btn').onclick = enviar;
        renderChat();
    </script>
</body>
</html>

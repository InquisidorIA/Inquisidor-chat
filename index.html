<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clarence | Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            background-color: #000; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            color: white;
            overflow: hidden;
        }
        /* La "Nube" de la barra */
        .glass-cloud {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <!-- Barra lateral (Visible siempre) -->
    <aside class="w-64 glass-cloud p-4 flex flex-col shrink-0">
        <h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4">Memoria</h2>
        <div id="history-list" class="flex-1 overflow-y-auto space-y-2">
            <div class="p-3 bg-white/5 rounded-xl text-sm">Conversación Actual</div>
        </div>
        <button class="mt-4 w-full py-2 bg-purple-600/20 rounded-lg text-sm border border-purple-500/50">+ Nueva</button>
    </aside>

    <!-- Área de chat -->
    <main class="flex-1 flex flex-col min-w-0">
        <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4">
            <div id="messages-list" class="max-w-xl mx-auto space-y-4"></div>
        </div>
        
        <div class="p-4 border-t border-gray-800">
            <div class="max-w-xl mx-auto flex gap-2">
                <input id="input" class="flex-1 bg-gray-900 p-3 rounded-lg outline-none text-white" placeholder="Mensaje...">
                <button id="send-btn" class="px-5 bg-purple-700 rounded-lg">Enviar</button>
            </div>
        </div>
    </main>

    <script>
        const mensajes = [{ role: 'assistant', content: "Aquí estoy." }];
        
        async function enviar() {
            const input = document.getElementById('input');
            if (!input.value.trim()) return;
            mensajes.push({ role: 'user', content: input.value });
            input.value = '';
            renderChat();
        }

        function renderChat() {
            const list = document.getElementById('messages-list');
            list.innerHTML = mensajes.map(m => `
                <div class="p-3 rounded-xl ${m.role === 'user' ? 'bg-gray-800 ml-auto' : 'bg-gray-900'} max-w-[90%]">
                    ${m.content}
                </div>
            `).join('');
        }

        // Eventos forzados
        document.getElementById('send-btn').addEventListener('click', enviar);
        document.getElementById('input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                enviar();
            }
        });

        renderChat();
    </script>
</body>
</html>

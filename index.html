<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarence</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }

        /* FONDO Y LUCES */
        #bg-effect {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #2e003e 0%, #000 70%);
            opacity: 0; transition: opacity 2s ease-in-out;
            pointer-events: none;
        }
        /* Estrellas blancas */
        .stars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: transparent; opacity: 0; transition: opacity 2s ease-in-out; }

        /* MENÚ SONRISA */
        #menu-btn { 
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: transparent; border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%; width: 50px; height: 50px; cursor: pointer;
            font-size: 24px; color: white; display: flex; align-items: center; justify-content: center;
        }

        /* CHAT */
        #chat-container { width: 100%; height: 100%; display: flex; flex-direction: column; padding: 80px 20px 20px; }
        #messages { flex-grow: 1; overflow-y: auto; }
        .clarence-msg { color: #b388ff; margin-bottom: 15px; font-size: 1.1em; }

        /* INPUT Y BOTÓN */
        #input-zone { display: flex; gap: 10px; padding-bottom: 20px; }
        input { flex-grow: 1; background: #1a1a1a; border: 1px solid #333; padding: 15px; border-radius: 15px; color: white; }
        #send-btn { background: #311b92; border: none; padding: 15px 25px; border-radius: 15px; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div id="bg-effect"></div>
    <button id="menu-btn" onclick="toggleLights()">◡</button>

    <div id="chat-container">
        <div id="messages">
            <p class="clarence-msg">Hola, soy Clarence. ¿En qué te puedo ayudar hoy?</p>
        </div>
        <div id="input-zone">
            <input type="text" id="user-input" placeholder="Escribe tu mensaje...">
            <button id="send-btn" onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script>
        function toggleLights() {
            const bg = document.getElementById('bg-effect');
            bg.style.opacity = bg.style.opacity === '1' ? '0' : '1';
        }

        function sendMessage() {
            const input = document.getElementById('user-input');
            const msg = input.value;
            if(msg.trim() !== "") {
                const chat = document.getElementById('messages');
                chat.innerHTML += `<p style="text-align: right;">${msg}</p>`;
                input.value = "";
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clarence</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        /* RESET Y BASE */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; }

        /* CONTENEDOR PRINCIPAL - Forzado a tamaño de pantalla */
        #app { width: 100vw; height: 100vh; position: relative; }

        /* BARRA LATERAL */
        #sidebar { 
            position: absolute; top: 0; left: -280px; width: 280px; height: 100%; 
            background: rgba(15, 15, 15, 0.98); border-right: 1px solid #333; 
            z-index: 1000; transition: left 0.3s ease;
            display: flex; flex-direction: column; padding: 20px;
        }
        #sidebar.activo { left: 0; }

        /* EFECTO DE LUZ/DESENFOQUE EN EL CHAT */
        #main-chat { 
            width: 100%; height: 100%; display: flex; flex-direction: column; 
            transition: filter 0.3s, background 0.3s;
        }
        #main-chat.blur { filter: blur(5px); pointer-events: none; }

        /* INTERFAZ CHAT */
        #chat-window { flex-grow: 1; padding: 20px; overflow-y: auto; }
        #input-zone { padding: 20px; border-top: 1px solid #222; background: #000; }
        
        input { 
            width: 100%; padding: 15px; background: #1a1a1a; border: 1px solid #444; 
            color: #fff; border-radius: 12px; outline: none; 
        }

        /* BOTONES Y ESTILOS */
        .menu-btn { padding: 10px; background: transparent; border: 1px solid #444; color: white; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="app">
        <aside id="sidebar">
            <h2 style="margin-bottom: 20px; font-size: 12px; color: #666; letter-spacing: 2px;">HISTORIAL</h2>
            <div id="history-list" style="flex-grow: 1;"></div>
            <button class="menu-btn" onclick="cerrarMenu()">Cerrar Menú</button>
        </aside>

        <main id="main-chat">
            <header style="padding: 15px;">
                <button class="menu-btn" onclick="abrirMenu()">☰ Menú</button>
            </header>
            <div id="chat-window">
                <p>Bienvenido, Nacho.</p>
            </div>
            <div id="input-zone">
                <input type="text" placeholder="Escribe tu mensaje...">
            </div>
        </main>
    </div>

    <script>
        // Lógica de apertura/cierre
        function abrirMenu() {
            document.getElementById('sidebar').classList.add('activo');
            document.getElementById('main-chat').classList.add('blur');
        }
        function cerrarMenu() {
            document.getElementById('sidebar').classList.remove('activo');
            document.getElementById('main-chat').classList.remove('blur');
        }

        // Registro del Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
            .then(() => console.log('SW activo'))
            .catch(err => console.log('Error SW:', err));
        }
    </script>
</body>
</html>

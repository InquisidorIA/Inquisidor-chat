<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarence | Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Estilos base para el efecto de carga */
        #main-body { transition: background 0.6s ease; }
        
        .is-loading {
            background: radial-gradient(circle at center, #2e1065 0%, #000 80%) !important;
        }

        .stars-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: radial-gradient(white, rgba(255,255,255,0.2) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .is-loading .stars-overlay { opacity: 0.4; }

        /* Scrollbar discreta */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#0A0A0A] text-zinc-200 h-screen flex flex-col font-sans" id="main-body">
    
    <!-- Capa de estrellas -->
    <div class="stars-overlay"></div>

    <!-- Chat Area -->
    <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-6">
        <div class="max-w-3xl mx-auto space-y-6 pt-4" id="messages-list"></div>
    </div>

    <!-- Input Area -->
    <div class="p-4 bg-[#0A0A0A] border-t border-zinc-800">
        <div class="max-w-3xl mx-auto">
            <div class="relative bg-zinc-900 rounded-xl border border-zinc-700 focus-within:border-purple-500 transition-all">
                <input id="input" 
                    class="w-full bg-transparent p-4 pr-16 text-white outline-none" 
                    placeholder="Escribe lo que tienes en mente..."
                    onkeydown="if(event.key==='Enter') enviar()">
                <button id="send-btn" class="absolute right-2 top-2 bottom-2 px-4 bg-purple-700 hover:bg-purple-600 text-white font-medium rounded-lg transition-colors">
                    Enviar
                </button>
            </div>
        </div>
    </div>

    <script>
        const userId = 'user_123';
        let mensajes = [{ role: 'assistant', content: "Aquí estoy. ¿Qué traes en mente hoy? Suéltalo." }];

        function renderChat() {
            const list = document.getElementById('messages-list');
            list.innerHTML = mensajes.map(m => `
                <div class="flex gap-4 ${m.role === 'user' ? 'justify-end' : 'justify-start'}">
                    <div class="max-w-[85%] p-4 rounded-2xl shadow-sm ${
                        m.role === 'user' 
                        ? 'bg-zinc-800 text-zinc-100' 
                        : 'bg-gradient-to-r from-purple-900/20 to-black border border-purple-500/30 text-zinc-200'
                    }">
                        ${m.content}
                    </div>
                </div>
            `).join('');
            const container = document.getElementById('chat-container');
            container.scrollTop = container.scrollHeight;
        }

        async function enviar() {
            const input = document.getElementById('input');
            const text = input.value.trim();
            if (!text) return;

            // Activar efecto visual
            const body = document.getElementById('main-body');
            body.classList.add('is-loading');

            mensajes.push({ role: 'user', content: text });
            input.value = '';
            renderChat();

            try {
                const res = await fetch('/api/chat', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ messages: mensajes, userId }) 
                });
                const data = await res.json();
                mensajes.push({ role: 'assistant', content: data.content });
            } catch (e) {
                mensajes.push({ role: 'assistant', content: "Error técnico. Clarence está ocupado." });
            } finally {
                // Desactivar efecto visual
                body.classList.remove('is-loading');
                renderChat();
            }
        }

        document.getElementById('send-btn').onclick = enviar;
        renderChat();
    </script>
</body>
</html>

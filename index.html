<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Inquisidor</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="https://i.imgur.com/rYqz9No.jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; height: 100vh; display: flex; }
        #chat-area { flex: 1; display: flex; flex-direction: column; height: 100vh; }
        #chat-scroll { flex: 1; overflow-y: auto; padding-bottom: 100px; }
    </style>
</head>
<body class="text-white">

    <!-- Sidebar -->
    <div id="sidebar" class="w-64 bg-zinc-950 border-r border-zinc-800 p-4 flex flex-col">
        <button onclick="nuevaSesion()" class="bg-amber-700 p-3 rounded mb-6 font-bold">+ Nueva Sesión</button>
        <div id="lista-sesiones" class="flex-1 overflow-y-auto space-y-2"></div>
    </div>

    <!-- Chat Area -->
    <div id="chat-area">
        <div id="chat-scroll"><div id="chat-container" class="max-w-2xl mx-auto p-6 space-y-6"></div></div>
        <div class="p-4 border-t border-zinc-900">
            <div class="max-w-2xl mx-auto flex gap-2">
                <input id="input" class="flex-1 bg-zinc-900 p-4 rounded" placeholder="Escribe al Inquisidor...">
                <button id="send-btn" class="bg-amber-700 px-6 rounded font-bold">Enviar</button>
            </div>
        </div>
    </div>

    <script>
        let sesiones = JSON.parse(localStorage.getItem('inquisidor_sesiones')) || [{ id: Date.now(), titulo: "Nueva Charla", mensajes: [] }];
        let actualId = sesiones[0].id;

        function guardar() { localStorage.setItem('inquisidor_sesiones', JSON.stringify(sesiones)); renderSidebar(); }

        function renderSidebar() {
            const list = document.getElementById('lista-sesiones');
            list.innerHTML = sesiones.map(s => `
                <div class="p-3 cursor-pointer rounded ${s.id === actualId ? 'bg-zinc-800' : 'hover:bg-zinc-900'}" onclick="cambiarSesion(${s.id})">
                    ${s.titulo}
                </div>
            `).join('');
        }

        function cambiarSesion(id) { actualId = id; renderChat(); renderSidebar(); }

        function nuevaSesion() {
            const nueva = { id: Date.now(), titulo: "Nueva Charla", mensajes: [] };
            sesiones.unshift(nueva);
            actualId = nueva.id;
            guardar();
            renderChat();
        }

        function renderChat() {
            const s = sesiones.find(x => x.id === actualId);
            document.getElementById('chat-container').innerHTML = s.mensajes.map(m => 
                `<div class="${m.role === 'user' ? 'text-right' : 'bg-[#1a1710] border-l-4 border-amber-600'} p-4">${m.content}</div>`
            ).join('');
        }

        async function enviar() {
            const input = document.getElementById('input');
            const text = input.value.trim();
            if (!text) return;

            let s = sesiones.find(x => x.id === actualId);
            s.mensajes.push({ role: 'user', content: text });
            input.value = '';
            
            // Si es el primer mensaje, cambiar título
            if (s.mensajes.length === 1) s.titulo = text.substring(0, 20);

            renderChat();
            
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ messages: s.mensajes })
            });
            const data = await res.json();
            s.mensajes.push({ role: 'assistant', content: data.content });
            guardar();
            renderChat();
        }

        document.getElementById('send-btn').onclick = enviar;
        renderSidebar();
        renderChat();
    </script>
</body>
</html>

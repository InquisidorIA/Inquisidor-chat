<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clarence</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }

        /* Fondo y Luces */
        #bg-effect {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(75, 0, 130, 0.4) 0%, transparent 80%),
                        radial-gradient(rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 100% 200%, 40px 40px;
            background-position: 0% 100%, 0 0;
            opacity: 0; pointer-events: none; z-index: 0; transition: opacity 0.3s ease;
        }
        @keyframes subirIluminacion {
            0% { opacity: 0; background-position: 0% 100%, 0 0; }
            30% { opacity: 1; }
            70% { opacity: 1; background-position: 0% 0%, 0 0; }
            100% { opacity: 0; background-position: 0% 0%, 0 0; }
        }
        .animar-subida { animation: subirIluminacion 4s ease-out forwards; }

        /* Barra Lateral */
        #history-sidebar { position: fixed; top: 0; left: -300px; width: 280px; height: 100%; background: #111; border-right: 1px solid #333; z-index: 500; transition: left 0.3s ease; padding: 20px; display: flex; flex-direction: column; }
        #history-sidebar.active { left: 0; }
        #sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 400; display: none; }
        #sidebar-overlay.active { display: block; }
        .sidebar-btn { background: #222; color: #fff; border: 1px solid #444; padding: 12px; margin-bottom: 10px; border-radius: 8px; cursor: pointer; text-align: left; width: 100%; }
        .sidebar-btn:hover { background: #333; }

        /* Interfaz */
        #menu-btn { position: absolute; top: 20px; left: 20px; z-index: 600; background: transparent; border: 1px solid rgba(255,255,255,0.3); border-radius: 50%; width: 50px; height: 50px; cursor: pointer; font-size: 24px; color: white; display: flex; align-items: center; justify-content: center; }
        #chat-container { width: 100%; height: 100%; display: flex; flex-direction: column; padding: 80px 20px 20px; z-index: 1; position: relative; }
        #messages { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .clarence-msg { align-self: flex-start; padding: 15px 20px; border-radius: 20px; background: linear-gradient(135deg, #4527a0, #000); border: 1px solid #673ab7; max-width: 80%; }
        .user-msg { align-self: flex-end; padding: 15px 20px; border-radius: 20px; background: #222; max-width: 80%; }
        #input-zone { display: flex; gap: 10px; padding-bottom: 20px; }
        input { flex-grow: 1; background: #1a1a1a; border: 1px solid #333; padding: 15px; border-radius: 15px; color: white; outline: none; }
        #send-btn { background: #311b92; border: none; padding: 0 25px; border-radius: 15px; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div id="bg-effect"></div>
    <div id="sidebar-overlay"></div>

    <div id="history-sidebar">
        <button id="new-chat-btn" class="sidebar-btn">+ Nueva Conversación</button>
        <h3 style="margin: 20px 0;">Historial</h3>
        <div id="history-list"></div>
    </div>

    <button id="menu-btn">◡</button>

    <div id="chat-container">
        <div id="messages"><p class="clarence-msg">Hola, soy Clarence. ¿En qué te puedo ayudar hoy?</p></div>
        <div id="input-zone">
            <input type="text" id="user-input" placeholder="Escribe tu mensaje...">
            <button id="send-btn">Enviar</button>
        </div>
    </div>

    <script>
        let currentChatId = 'chat_' + Date.now();

        // Elementos
        const sidebar = document.getElementById('history-sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        const menuBtn = document.getElementById('menu-btn');
        const sendBtn = document.getElementById('send-btn');
        const userInput = document.getElementById('user-input');
        const newChatBtn = document.getElementById('new-chat-btn');

        // Funciones de navegación
        function toggleMenu() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        menuBtn.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu);

        newChatBtn.addEventListener('click', () => {
            currentChatId = 'chat_' + Date.now();
            document.getElementById('messages').innerHTML = '<p class="clarence-msg">Nueva conversación iniciada.</p>';
            toggleMenu();
        });

        async function sendMessage() {
            const msg = userInput.value;
            if(msg.trim() === "") return;

            const chat = document.getElementById('messages');
            const userP = document.createElement('p');
            userP.className = 'user-msg';
            userP.innerText = msg;
            chat.appendChild(userP);
            userInput.value = "";

            const bg = document.getElementById('bg-effect');
            bg.classList.remove('animar-subida');
            void bg.offsetWidth; 
            bg.classList.add('animar-subida');

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        userId: 'user_123', 
                        chatId: currentChatId,
                        title: msg.substring(0, 20),
                        messages: [{ role: 'user', content: msg }] 
                    })
                });
                const data = await res.json();
                const aiP = document.createElement('p');
                aiP.className = 'clarence-msg';
                aiP.innerText = data.content;
                chat.appendChild(aiP);
                chat.scrollTop = chat.scrollHeight;
            } catch (e) {
                chat.innerHTML += `<p class="clarence-msg">Error de conexión.</p>`;
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') sendMessage(); });

        // Cargar historial
        fetch('/api/history?userId=user_123')
            .then(res => res.json())
            .then(chats => {
                const list = document.getElementById('history-list');
                chats.forEach(chat => {
                    const btn = document.createElement('button');
                    btn.className = 'sidebar-btn';
                    btn.innerText = chat.title;
                    btn.addEventListener('click', () => loadChat(chat.chat_id));
                    list.appendChild(btn);
                });
            });

        async function loadChat(chatId) {
            currentChatId = chatId;
            const chat = document.getElementById('messages');
            chat.innerHTML = '<p class="clarence-msg">Cargando...</p>';
            try {
                const res = await fetch(`/api/getMessages?chatId=${chatId}`);
                const data = await res.json();
                chat.innerHTML = '';
                data.forEach(m => {
                    const p = document.createElement('p');
                    p.className = m.role === 'user' ? 'user-msg' : 'clarence-msg';
                    p.innerText = m.message;
                    chat.appendChild(p);
                });
                chat.scrollTop = chat.scrollHeight;
            } catch (e) {
                chat.innerHTML = '<p class="clarence-msg">Error al cargar.</p>';
            }
            toggleMenu();
        }
    </script>
</body>
</html>

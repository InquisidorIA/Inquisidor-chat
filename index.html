<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <!-- CRÍTICO PARA EL MÓVIL: Evita que la página se vea alejada -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
        }
        #chat-scroll {
            flex: 1;
            overflow-y: auto;
            /* Padding para evitar que el input tape el último mensaje */
            padding-bottom: 150px; 
            width: 100%;
        }
        .inquisidor-font { font-family: 'Playfair Display', serif; }
        .user-font { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-white">
    
    <!-- Contenedor principal con scroll -->
    <div id="chat-scroll">
        <div id="chat-container" class="w-full max-w-2xl mx-auto p-4 md:p-6 flex flex-col space-y-8 mt-10">
            <!-- Los mensajes aparecerán aquí -->
        </div>
    </div>

    <!-- Input Fijo: Ancho completo en móvil, centrado en PC -->
    <div class="fixed bottom-0 left-0 w-full p-4 bg-gradient-to-t from-black via-black to-transparent border-t border-zinc-900">
        <div class="max-w-2xl mx-auto">
            <input id="input" 
                   type="text"
                   class="w-full bg-zinc-900/90 backdrop-blur-md border border-zinc-700 p-4 text-white focus:outline-none focus:border-amber-600 transition-all rounded-sm shadow-2xl text-base" 
                   placeholder="Escribe aquí..."
                   autocomplete="off">
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const chatScroll = document.getElementById('chat-scroll');
        const input = document.getElementById('input');

        // Bienvenida
        window.onload = () => {
            chatContainer.innerHTML += <div class="flex justify-start fade-in"><div class="max-w-[90%] md:max-w-[80%] bg-[#1a1710] border border-[#7a5c24] p-5 text-amber-100 inquisidor-font rounded-sm shadow-xl text-base md:text-lg">Bienvenido. ¿Qué tienes hoy en mente? Estoy listo para iluminarte o debatir.</div></div>;
        };

        // Función de envío
        async function enviarMensaje() {
            const text = input.value.trim();
            if (text === '') return;

            // Mostrar usuario
            chatContainer.innerHTML += <div class="flex justify-end"><div class="max-w-[90%] md:max-w-[80%] bg-zinc-800 p-4 text-zinc-100 user-font rounded-sm shadow-lg text-base">${text}</div></div>;
            input.value = '';
            chatScroll.scrollTop = chatScroll.scrollHeight;

            // Petición API
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ messages: [{role: 'user', content: text}] })
                });
                const data = await res.json();

                chatContainer.innerHTML += `
                    <div class="flex justify-start fade-in">
                        <div class="max-w-[90%] md:max-w-[80%] bg-[#1a1710] border border-[#7a5c24] p-5 text-amber-100 inquisidor-font rounded-sm shadow-xl text-base md:text-lg">
                            ${data.content}
                        </div>
                    </div>`;
                chatScroll.scrollTop = chatScroll.scrollHeight;
            } catch (e) {
                console.error("Error:", e);
            }
        }

        // Evento Enter (funciona tanto en PC como en teclado de móvil)
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') enviarMensaje();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarence | Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; height: 100vh; overflow: hidden; }
        /* Efecto Nubes */
        .glass-cloud {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border-radius: 50px 20px 50px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #fx-layer { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #000 70%); }
    </style>
</head>
<body class="flex h-screen text-zinc-200 font-sans">
    <div id="fx-layer"></div>

    <!-- Barra Lateral (Nubes) -->
    <div class="w-64 glass-cloud m-4 p-4 flex flex-col gap-4 hidden md:flex">
        <h2 class="text-xs font-bold text-zinc-500 uppercase tracking-widest">Memoria</h2>
        <div id="history-list" class="flex-1 overflow-y-auto space-y-2">
            <!-- Aquí se cargarán tus chats -->
            <div class="p-2 hover:bg-white/5 rounded-lg cursor-pointer flex justify-between group">
                <span class="truncate">Conversación 1</span>
                <button class="opacity-0 group-hover:opacity-100">📌</button>
            </div>
        </div>
        <button class="w-full py-2 bg-purple-900/30 rounded-xl hover:bg-purple-900/50">+ Nueva</button>
    </div>

    <!-- Chat Area -->
    <div class="flex-1 flex flex-col h-full">
        <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4">
            <div class="max-w-2xl mx-auto space-y-4" id="messages-list"></div>
        </div>
        <div class="p-4 border-t border-zinc-800 bg-black/50">
            <div class="max-w-2xl mx-auto flex gap-2">
                <input id="input" class="flex-1 bg-zinc-900 p-3 rounded-lg border border-zinc-700 outline-none" placeholder="Habla...">
                <button id="send-btn" class="px-4 bg-purple-700 rounded-lg">Enviar</button>
            </div>
        </div>
    </div>

    <script>
        // Lógica de gestión de chats (Skeleton)
        const chats = [{ id: 1, title: "Proyecto Clarence", pinned: true }];
        
        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = chats.map(c => `
                <div class="p-2 hover:bg-white/5 rounded-lg flex justify-between group cursor-pointer transition">
                    <span class="truncate">${c.title}</span>
                    <div class="flex gap-1">
                        <button onclick="editChat(${c.id})">✏️</button>
                        <button onclick="deleteChat(${c.id})">🗑️</button>
                    </div>
                </div>
            `).join('');
        }
        
        renderHistory();
        // ... (Tu lógica de enviar y renderChat anterior)
    </script>
</body>
</html>
